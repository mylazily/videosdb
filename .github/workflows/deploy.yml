name: Database CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'migrations/**'
      - 'docker-compose.yml'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'migrations/**'
      - 'docker-compose.yml'
      - 'scripts/**'
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点自动备份

env:
  DEPLOY_HOST: 141.148.0.209
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/videosdb

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SQL syntax
        run: |
          # 检查 SQL 文件语法
          for file in migrations/*.sql; do
            echo "Checking: $file"
            # 检查文件是否为空
            if [ ! -s "$file" ]; then
              echo "Error: $file is empty"
              exit 1
            fi
            # 检查是否包含分号
            if ! grep -q ";" "$file"; then
              echo "Warning: $file may not have proper semicolons"
            fi
          done

      - name: Validate docker-compose
        run: |
          docker compose config > /dev/null

  test-migrations:
    runs-on: ubuntu-latest
    needs: validate

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 && break
            sleep 2
          done

      - name: Test migrations
        env:
          PGPASSWORD: test
        run: |
          # 按顺序执行迁移文件测试
          for file in migrations/*.sql; do
            echo "Testing migration: $file"
            psql -h localhost -U test -d testdb -f "$file" || exit 1
          done

      - name: Verify schema
        env:
          PGPASSWORD: test
        run: |
          psql -h localhost -U test -d testdb -c "\dt" || exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: [validate, test-migrations]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host deploy-server
            HostName ${{ env.DEPLOY_HOST }}
            User ${{ env.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Deploy database changes
        run: |
          # 同步迁移文件
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" migrations/ deploy-server:${{ env.DEPLOY_PATH }}/migrations/
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" scripts/ deploy-server:${{ env.DEPLOY_PATH }}/scripts/
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" docker-compose.yml deploy-server:${{ env.DEPLOY_PATH }}/
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" Makefile deploy-server:${{ env.DEPLOY_PATH }}/

      - name: Apply migrations
        run: |
          ssh -i ~/.ssh/deploy_key deploy-server << 'REMOTESCRIPT'
            set -e
            cd /opt/videosdb
            
            # 确保数据库容器正在运行
            if ! docker compose ps | grep -q "postgres"; then
              echo "Starting database containers..."
              docker compose up -d
              sleep 10
            fi
            
            # 执行迁移
            make migrate || exit 1
            
            # 验证迁移状态
            make status
            
            echo "✅ Database migration completed successfully"
          REMOTESCRIPT

      - name: Backup before major changes
        if: contains(github.event.head_commit.message, '[major]')
        run: |
          ssh -i ~/.ssh/deploy_key deploy-server << 'REMOTESCRIPT'
            cd /opt/videosdb
            make backup
          REMOTESCRIPT

  scheduled-backup:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *'

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host deploy-server
            HostName ${{ env.DEPLOY_HOST }}
            User ${{ env.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Run scheduled backup
        run: |
          ssh -i ~/.ssh/deploy_key deploy-server << 'REMOTESCRIPT'
            cd /opt/videosdb
            make backup
            
            # 清理7天前的备份
            find backups -name "*.sql.gz" -mtime +7 -delete
            echo "✅ Scheduled backup completed"
          REMOTESCRIPT
